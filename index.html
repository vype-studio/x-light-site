<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  opacity:0;
  animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
  to{ opacity:1; }
}

header{
  background:#000;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
  text-align:center;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
  animation:cardFade 0.6s ease forwards;
}

@keyframes cardFade{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  background:#f4f4f4;
}

.card-content{
  padding:15px;
}

.price{
  color:#00b7c2;
  font-weight:bold;
  font-size:18px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  max-width:700px;
  padding:20px;
  border-radius:12px;
  max-height:90vh;
  overflow:auto;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

.variant-box{
  background:#f9fafb;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.variant-box strong{
  font-size:18px;
  display:block;
  margin-bottom:5px;
}

.variant-price{
  color:#00b7c2;
  font-weight:bold;
  font-size:16px;
  margin-bottom:5px;
}

.variant-size{
  color:#555;
  font-size:14px;
  margin-bottom:5px;
}

.stock-in{
  color:#16a34a;
  font-weight:bold;
}

.stock-out{
  color:#dc2626;
  font-weight:bold;
}

.variant-box button{
  margin-top:10px;
  background:#00b7c2;
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* ✅ Footer */
footer{
  background:#000;
  color:white;
  padding:35px 20px;
  text-align:center;
  margin-top:50px;
}

footer h3{
  margin-bottom:10px;
}

footer a{
  color:#00b7c2;
  text-decoration:none;
  font-weight:bold;
}

footer a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<header>
<img src="logo.png">
<h2>X-Light</h2>
</header>

<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search product..."
style="padding:10px 15px;border-radius:6px;border:1px solid #ccc;width:220px;margin-right:10px;">
<select id="categoryFilter">
<option value="all">All Categories</option>
</select>
</div>

<div class="products" id="productList"></div>
