<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  transition:0.3s;
}

.dark body{
  background:#121212;
}

header{
  background:#000;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{height:55px}
header h2{color:white;margin:0}

.header-right{
  display:flex;
  align-items:center;
  gap:15px;
}

.dark-toggle{
  background:#00b7c2;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.filter-bar{
  text-align:center;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.3s;
}

.dark .card{
  background:#1e1e1e;
  color:white;
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  background:#f4f4f4;
}

.dark .card img{
  background:#2a2a2a;
}

.card-content{
  padding:15px;
}

.price{
  color:#00b7c2;
  font-weight:bold;
  font-size:18px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<div class="header-right">
<h2>X-Light</h2>
<button class="dark-toggle" onclick="toggleDark()">🌙</button>
</div>
</header>

<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search product..."
style="padding:10px 15px;border-radius:6px;border:1px solid #ccc;width:200px;margin-right:10px;">

<select id="categoryFilter">
<option value="all">All Categories</option>
</select>

<select id="sortSelect" style="margin-left:10px;padding:8px;border-radius:6px;">
<option value="default">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
<option value="instock">In Stock Only</option>
</select>
</div>

<div class="products" id="productList"></div>

<a class="whatsapp"
href="https://wa.me/201092278234"
target="_blank">
WhatsApp
</a>

<script>

const productsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=0&single=true&output=csv";
const variantsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=365796544&single=true&output=csv";

function parseCSV(text){
  const rows=text.trim().split("\n");
  const headers=rows[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return rows.slice(1).map(row=>{
    const cols=row.split(",");
    let obj={};
    headers.forEach((h,i)=>{
      obj[h]= (cols[i]||"").replace(/"/g,"").trim();
    });
    return obj;
  });
}

let globalProducts=[];
let globalVariants=[];

async function loadData(){
  globalProducts=parseCSV(await fetch(productsURL).then(r=>r.text()));
  globalVariants=parseCSV(await fetch(variantsURL).then(r=>r.text()));
  renderProducts(globalProducts);
  buildFilter();
}

function renderProducts(products){
  const container=document.getElementById("productList");
  container.innerHTML="";

  products.forEach(p=>{
    const related=globalVariants.filter(v=>v.ProductID===p.ProductID);
    const anyInStock=related.some(v=>v.Stock==="In Stock");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.Image}" onerror="this.src='https://via.placeholder.com/400'">
      <div class="card-content">
        <h3>${p.Name}</h3>
        <p>${p.Category}</p>
        ${related.length?`<p class="price">${related[0].Price} EGP</p>`:""}
        <span class="badge ${anyInStock?'in':'out'}">${anyInStock?'In Stock':'Out of Stock'}</span>
      </div>
    `;

    container.appendChild(card);
  });
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

document.getElementById("sortSelect").addEventListener("change",function(){
  let sorted=[...globalProducts];

  if(this.value==="low"){
    sorted.sort((a,b)=>a.Price-b.Price);
  }
  else if(this.value==="high"){
    sorted.sort((a,b)=>b.Price-a.Price);
  }
  else if(this.value==="instock"){
    sorted=sorted.filter(p=>{
      const related=globalVariants.filter(v=>v.ProductID===p.ProductID);
      return related.some(v=>v.Stock==="In Stock");
    });
  }

  renderProducts(sorted);
});

loadData();

</script>

</body>
</html>
