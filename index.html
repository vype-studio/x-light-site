<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#000;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
  text-align:center;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  background:#f4f4f4;
}

.card-content{
  padding:15px;
}

.price{
  color:#00b7c2;
  font-weight:bold;
  font-size:18px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

/* ✅ Floating Buttons */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.location{
  position:fixed;
  bottom:85px;   /* ✅ فوق الواتساب */
  right:20px;
  background:#00b7c2;
  color:white;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h2>X-Light</h2>
</header>

<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search product..."
style="padding:10px 15px;border-radius:6px;border:1px solid #ccc;width:220px;margin-right:10px;">
<select id="categoryFilter">
<option value="all">All Categories</option>
</select>
</div>

<div class="products" id="productList"></div>

<!-- ✅ Location Button -->
<a class="location"
href="https://www.google.com/maps/search/X%20light%20magnetic__track%20%D9%85%D8%A7%D8%AC%D9%86%D8%AA%D9%83%2C%20%E2%80%8F%D8%A7%D9%84%D9%82%D8%A7%D9%87%D8%B1%D8%A9%E2%80%8F%D8%8C%20%E2%80%8F%D9%85%D8%AD%D8%A7%D9%81%D8%B8%D8%A9%20%D8%A7%D9%84%D9%82%D8%A7%D9%87%D8%B1%D8%A9%E2%80%8F%D8%8C%20%E2%80%8F%D9%85%D8%B5%D8%B1%E2%80%8F%2C%20Cairo%2C%20Cairo%20Governorate%2C%20Egypt/@30.0223,31.5186,17z?hl=en"
target="_blank">
📍 موقعنا
</a>

<a class="whatsapp"
href="https://wa.me/201092278234"
target="_blank">
WhatsApp
</a>

<script>
const productsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=0&single=true&output=csv";
const variantsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=365796544&single=true&output=csv";

function parseCSV(text){
  const rows=text.trim().split("\n");
  const headers=rows[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return rows.slice(1).map(row=>{
    const cols=row.split(",");
    let obj={};
    headers.forEach((h,i)=>{
      obj[h]= (cols[i]||"").replace(/"/g,"").trim();
    });
    return obj;
  });
}

let globalProducts=[];
let globalVariants=[];

async function loadData(){
  globalProducts=parseCSV(await fetch(productsURL).then(r=>r.text()));
  globalVariants=parseCSV(await fetch(variantsURL).then(r=>r.text()));
  renderProducts();
  buildFilter();
}

function renderProducts(){
  const container=document.getElementById("productList");
  container.innerHTML="";

  globalProducts.forEach(p=>{
    if(!p.ProductID) return;

    const related=globalVariants.filter(v=>v.ProductID===p.ProductID);
    const anyInStock=related.some(v=>v.Stock==="In Stock");

    const card=document.createElement("div");
    card.className="card";
    card.setAttribute("data-category",p.Category);

    card.innerHTML=`
      <img src="${p.Image}" onerror="this.src='https://via.placeholder.com/400'">
      <div class="card-content">
        <h3>${p.Name}</h3>
        <p>${p.Category || ""}</p>
        ${related.length?`<p class="price">${related[0].Price} EGP</p>`:""}
        ${related.length?`<span class="badge ${anyInStock?'in':'out'}">${anyInStock?'In Stock':'Out of Stock'}</span>`:""}
      </div>
    `;

    container.appendChild(card);
  });
}

function buildFilter(){
  const select=document.getElementById("categoryFilter");
  const categories=[...new Set(globalProducts.map(p=>p.Category).filter(Boolean))];

  categories.forEach(cat=>{
    const option=document.createElement("option");
    option.value=cat;
    option.textContent=cat;
    select.appendChild(option);
  });

  select.addEventListener("change",e=>{
    const value=e.target.value;
    const cards=document.querySelectorAll(".card");
    cards.forEach(card=>{
      if(value==="all") card.style.display="block";
      else card.style.display=card.getAttribute("data-category")===value?"block":"none";
    });
  });
}

document.addEventListener("input",function(e){
  if(e.target.id==="searchInput"){
    const searchValue=e.target.value.toLowerCase();
    const cards=document.querySelectorAll(".card");
    cards.forEach(card=>{
      const text=card.innerText.toLowerCase();
      card.style.display=text.includes(searchValue)?"block":"none";
    });
  }
});

loadData();
</script>

</body>
</html>
