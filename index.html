<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Light Catalog</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}
header{background:#111;padding:15px 25px;display:flex;justify-content:space-between;align-items:center}
header img{height:50px}
header h2{color:white;margin:0}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
.card img{width:100%;height:220px;object-fit:cover}
.card-content{padding:15px}
.badge{display:inline-block;padding:4px 8px;border-radius:20px;font-size:12px;margin-top:5px}
.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}
button{margin-top:10px;padding:8px 12px;background:#00aeb5;color:white;border:none;border-radius:6px;cursor:pointer}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:12px 18px;border-radius:50px;text-decoration:none}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h2>X-Light</h2>
</header>

<div class="products" id="productList"></div>

<a class="whatsapp" href="https://wa.me/201092278234" target="_blank">WhatsApp</a>

<script>

// ✅ استخدم JSON بدل CSV
const SHEET_ID = "2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L";
const PRODUCTS_URL = `https://opensheet.elk.sh/${SHEET_ID}/Products`;
const VARIANTS_URL = `https://opensheet.elk.sh/${SHEET_ID}/Variants`;

async function loadData(){
  const products = await fetch(PRODUCTS_URL).then(r=>r.json());
  const variants = await fetch(VARIANTS_URL).then(r=>r.json());

  renderProducts(products, variants);
}

function renderProducts(products, variants){
  const container = document.getElementById("productList");
  container.innerHTML="";

  products.forEach(prod=>{
    if(!prod.ProductID) return;

    const related = variants.filter(v=>v.ProductID===prod.ProductID);
    const first = related[0];

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${prod.Image}" onerror="this.src='https://via.placeholder.com/400'">
      <div class="card-content">
        <h3>${prod.Name}</h3>
        <p>${prod.Category}</p>
        ${first ? `<p><strong>${first.Price} EGP</strong></p>` : ""}
        ${first ? `<span class="badge ${first.Stock==='In Stock'?'in':'out'}">${first.Stock}</span>` : ""}
      </div>
    `;

    container.appendChild(card);
  });
}

loadData();
</script>

</body>
</html>
